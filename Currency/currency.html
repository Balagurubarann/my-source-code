<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Convertor</title>
    <link rel="stylesheet" href="style.css">
    <script src="./main.js" defer></script>
</head>
<body>

    <div class="container" id="container">
        <div class="heading" id="heading">
            <h2 class="title" id="title">
                Currency Convertor
            </h2>
        </div>

        <div class="left-box center" id="left-box">
            <select name="currency" class="currency selector">

            </select>
            <input type="number" id="input" class="input" autocomplete="off">
        </div>

        <div class="right-box center" id="right-box">
            <select name="currency" class="currency selector">

            </select>
            <input type="number" id="result" class="result" disabled autocomplete="off">
        </div>


        <div class="submit-section center">
            <button class="btn">Convert</button>
        </div>

    </div>
    
</body>
</html>
