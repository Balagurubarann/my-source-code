<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=1024, initial-scale=1.0">
    <title>Dictionary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <script src="./dict.js" defer></script>
</head>
<body class="center">

    <div class="container" id="container">

        <form action="#">
            <input type="text" name="input" id="input-word" class="input-word remove" autocomplete="off" autofocus>
            <button type="submit" class="search-btn remove">
                <i class="fas fa-magnifying-glass"></i>
            </button>

            <button type="reset" class="reset-btn remove">
                <i class="fas fa-redo"></i>
            </button>
        </form>

        <div class="output-container center" id="output-container">

            <p class="word">
                
            </p>

            <p class="output" id="output">

            </p>
        </div>

    </div>
    
</body>
</html>
